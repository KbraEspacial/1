<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bloc de Notas Empresarial</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            display: flex;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
        }
        h2 { color: #333; text-align: center; }
        textarea {
            width: 100%;
            height: 100px;
            padding: 10px;
            margin-bottom: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box; /* Evita que el padding desborde el ancho */
        }
        button {
            width: 100%;
            padding: 10px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover { background-color: #218838; }
        .lista-notas { margin-top: 20px; }
        .nota {
            background: #fff9c4;
            padding: 10px;
            margin-bottom: 5px;
            border-left: 5px solid #fbc02d;
            word-wrap: break-word;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Mi Bloc de Notas</h2>
    <textarea id="textoNota" placeholder="Escribe algo importante..."></textarea>
    <button onclick="agregarNota()">Guardar Nota</button>

    <div class="lista-notas" id="contenedorNotas">
        </div>
</div>

<script>
    function agregarNota() {
        const input = document.getElementById('textoNota');
        const lista = document.getElementById('contenedorNotas');
        
        if (input.value.trim() === "") {
            alert("Por favor, escribe algo antes de guardar.");
            return;
        }

        const nuevaNota = document.createElement('div');
        nuevaNota.classList.add('nota');
        nuevaNota.innerText = input.value;

        lista.appendChild(nuevaNota);

        input.value = "";
    }
</script>

</body>
</html>
